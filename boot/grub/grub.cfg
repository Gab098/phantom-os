set default="0"
set timeout=5

# Detect root UUID if available
if [ -z "${root_uuid}" ]; then
    search --no-floppy --fs-uuid --set=root_part ""
fi

menuentry "PhantomOS" {
    insmod part_gpt
    insmod ext2
    insmod lvm
    search --no-floppy --fs-uuid --set=root ${root_uuid}
    linux /boot/vmlinuz-6.12-phantomos root=/dev/sda3 ro quiet splash
    initrd /boot/initrd.img-6.12-phantomos
}

menuentry "PhantomOS (Encrypted)" {
    insmod part_gpt
    insmod luks
    insmod lvm
    linux /boot/vmlinuz-6.12-phantomos root=/dev/mapper/cryptroot ro quiet splash
    initrd /boot/initrd.img-6.12-phantomos
}

menuentry "PhantomOS (Live ISO)" {
    insmod part_gpt
    insmod iso9660
    insmod squash4
    insmod loopback
    linux /boot/vmlinuz-6.12-phantomos phantom.live ro quiet splash
    initrd /boot/initrd.img-6.12-phantomos
}

menuentry "PhantomOS (Recovery)" {
    linux /boot/vmlinuz-6.12-phantomos root=/dev/sda3 ro single
    initrd /boot/initrd.img-6.12-phantomos
}

menuentry "PhantomOS (Safe Graphics)" {
    linux /boot/vmlinuz-6.12-phantomos root=/dev/sda3 ro quiet nomodeset
    initrd /boot/initrd.img-6.12-phantomos
}

menuentry "Hardware Info" {
    insmod cpuid
    lscpu
}

menuentry "Reboot" {
    reboot
}

menuentry "Shutdown" {
    halt
}